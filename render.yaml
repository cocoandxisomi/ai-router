services:
  - type: web
    name: ai-router
    runtime: python
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SF_API_KEY
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: SMTP_HOST
        value: smtp.qq.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        value: "3050781742@qq.com"
      - key: SMTP_PASS
        sync: false
    plan: free